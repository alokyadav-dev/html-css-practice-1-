<!-- we create a subscribe, join, tweet button 
 apply background color and hower effect-->

<style>
  .Subscribe-button {
    background-color: rgb(200, 0, 0);
    color: white;
    border-radius: 2px;
    border: none;
    height: 36px;
    cursor: pointer;
    margin-right: 6px;
    width: 105px;
  }
</style>
 <button class = Subscribe-button>SUBSCRIBE</button>


<style>
  .Join-button {
    background-color: rgb(255, 255, 255);
    color: rgb(0, 144, 144);
    border: 1px;
    border-color: rgb(43, 42, 51);
    border-radius: 2px;
    border-style: solid;
    width: 67px;
    height: 36px;
    margin-right: 6px;
    cursor: pointer;

  }
</style>
 <button class=" Join-button">JOIN</button>

<style>
  .Tweet-button {
    background-color: rgb(2, 82, 82);
    color: white;
    border: none;
    border-radius: 18px; 
    height:36px;
    width: 74px;
    font-weight: bold;
    font-size: 13px;
    cursor: pointer;


  }
</style>
 <button class=" Tweet-button">Tweet</button>
