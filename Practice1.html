<style>
  .subscribe-button {
    background-color: rgb(200, 0, 0);
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 2px;
    padding-left: 8px;
    padding-right:8px;
    padding-top: 9;
    padding-bottom: 9;
    cursor: pointer;
    margin-right: 8px;
    transition: opacity 0.15s;
    vertical-align: top;
  }

  .subscribe-button:hover {
    opacity: 0.8;
  }

  .subscribe-button:active {
    opacity: 0.5;
  }

  .join-button {
    background-color: white;
    border-color: rgb(41, 118, 211);
    border-style: solid;
    font-size: 16px;
    border-radius: 2px;
    padding-left: 7px;
    padding-right: 7px;
    padding-top: 8;
    padding-bottom: 8;
    border-width: 1px;
    color: rgb(41, 118, 211);
    border-radius: 2px;
    cursor: pointer;
    vertical-align: top;

    transition: background-color 0.15s,
      color 0.15s;
  }

  .join-button:hover {
    background-color: rgb(41, 118, 211);
    color: white;
  }

  .join-button:active {
    opacity: 0.7;
  }

  .tweet-button {
    background-color: rgb(2, 158, 255);
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 2px;
    padding-left: 15px;
    padding-right: 15px;
    padding-top:10px;
    padding-bottom:10px;
    border-radius: 8px;
    border-radius: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-left: 8px;
    transition: box-shadow 0.15s;
    vertical-align: top;
  }

  .tweet-button:hover {
    box-shadow: 5px 5px 10px rgba(11, 11, 11, 0.15);
  }
</style>

<button class="subscribe-button">
  SUBSCRIBE
</button>

<button class="join-button">
  JOIN
</button>

<button class="tweet-button">
  Tweet
</button>
